name: Build Windows Binary

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 MingW-w64
        run: sudo apt-get install -y mingw-w64

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-unknown-linux-gnu

      - name: 添加 Windows 目标架构
        run: rustup target add x86_64-pc-windows-gnu

      - name: 下载并解压 FFmpeg
        run: |
          curl -L https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz  | tar xJ
          export FFMPEG_DIR=$(pwd)/ffmpeg-6.0-amd64-static

      - name: 设置链接器环境变量
        run: |
          export X86_64_PC_WINDOWS_GNU_AVFORMAT_LIB_DIR=${FFMPEG_DIR}/lib
          export X86_64_PC_WINDOWS_GNU_AVFORMAT_INCLUDE_DIR=${FFMPEG_DIR}/include
          export X86_64_PC_WINDOWS_GNU_AVFORMAT_STATIC=1

      - name: 构建 Windows 二进制文件
        run: |
          cargo build --target x86_64-pc-windows-gnu --release
          cp target/x86_64-pc-windows-gnu/release/your_program.exe .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: your_program.exe
