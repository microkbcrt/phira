name: Rust CI

on:
  push:
    branches:
      - main  # 在 main 分支有 push 时触发
  pull_request:
    branches:
      - main  # 对 main 分支的 pull request 触发

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境来运行

    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # 获取代码

    - name: Set up Rust
      uses: actions/setup-rust@v1  # 设置 Rust 环境

    - name: Install dependencies
      run: cargo install --path .  # 安装所有依赖

    - name: Build
      run: cargo build --release  # 编译程序

    - name: Run tests
      run: cargo test  # 如果有测试的话，执行测试
